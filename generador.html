<!DOCTYPE html>
<html>
<body>
    <input type="text" id="modelo" placeholder="Modelo">
    <button id="btn">Generar</button>
    <div id="resultado"></div>

    <script>
    document.getElementById('btn').onclick = async () => {
    const dispositivo = document.getElementById('modelo').value;
    const res = document.getElementById('resultado');
    
    res.textContent = "Consultando a la IA...";

    try {
        // AQUÍ PONES LA URL QUE TE DIO RENDER
        // Ejemplo: "https://tu-proyecto.onrender.com/api/generar"
        const response = await fetch("https://josuexs-proxy.onrender.com", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dispositivo: dispositivo })
        });

        const data = await response.json();
        
        // Esto muestra la respuesta que viene desde tu servidor
        res.textContent = data.candidates[0].content.parts[0].text;
    } catch (err) {
        res.textContent = "Error al conectar con el servidor: " + err.message;
    }
};
</script>
</body>
</html>
